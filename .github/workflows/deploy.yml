name: Deploy to Production

on:
  push:
    branches: [main]

jobs:
  deploy:
    name: Deploy to Vultr
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        env:
          GH_TOKEN: ${{ secrets.GH_DEPLOY_TOKEN }}
          SUDO_PASS: ${{ secrets.VULTR_SUDO_PASS }}
        with:
          host: ${{ secrets.VULTR_HOST }}
          username: ${{ secrets.VULTR_USER }}
          key: ${{ secrets.VULTR_KEY }}
          port: ${{ secrets.VULTR_PORT }}
          envs: GH_TOKEN,SUDO_PASS
          script: |
            set -e
            export DEPLOY_PATH="${{ secrets.VULTR_DEPLOYMENT_PATH }}"

            # Trust repo ownership for any user
            git config --global --add safe.directory "$DEPLOY_PATH"

            # 1. Take ownership so radar can do git pull + npm
            echo "$SUDO_PASS" | sudo -S chown -R radar:www-data "$DEPLOY_PATH"

            cd "$DEPLOY_PATH"

            # 2. Pull latest code
            git remote set-url origin https://x-access-token:${GH_TOKEN}@github.com/Freddo444/radardelicitaciones.git
            git pull origin main
            git remote set-url origin https://github.com/Freddo444/radardelicitaciones.git

            # 3. Install JS dependencies and build assets
            npm ci --no-audit
            npm run build

            # 4. Give www-data group ownership so PHP-FPM can read, radar user can write
            echo "$SUDO_PASS" | sudo -S chown -R radar:www-data "$DEPLOY_PATH"

            # 5. Fix file permissions: 644 for files, 755 for dirs, 775 for writable dirs
            echo "$SUDO_PASS" | sudo -S find "$DEPLOY_PATH" -type f -not -path '*/.git/*' -not -path '*/node_modules/*' -exec chmod 644 {} +
            echo "$SUDO_PASS" | sudo -S find "$DEPLOY_PATH" -type d -not -path '*/.git/*' -not -path '*/node_modules/*' -exec chmod 755 {} +
            echo "$SUDO_PASS" | sudo -S chmod -R 775 "$DEPLOY_PATH/storage" "$DEPLOY_PATH/bootstrap/cache"
            echo "$SUDO_PASS" | sudo -S chmod 755 "$DEPLOY_PATH/artisan"

            # 6. Composer install as radar (owns vendor dir)
            cd "$DEPLOY_PATH"
            composer install --no-interaction --prefer-dist --optimize-autoloader

            # 7. Ensure storage/cache writable by www-data
            echo "$SUDO_PASS" | sudo -S chown -R www-data:www-data "$DEPLOY_PATH/storage" "$DEPLOY_PATH/bootstrap/cache"

            # 8. Artisan tasks as www-data (needs to write cache files)
            echo "$SUDO_PASS" | sudo -S -u www-data bash -c "
              cd '$DEPLOY_PATH'
              php artisan migrate --force
              php artisan config:cache
              php artisan route:cache
              php artisan event:cache
              php artisan queue:restart 2>/dev/null || true
            "

            # 9. Restart supervisor worker
            echo "$SUDO_PASS" | sudo -S supervisorctl restart radar-worker:* 2>/dev/null || true

            echo 'Deployment complete.'
