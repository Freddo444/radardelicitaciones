name: Deploy to Production

on:
  push:
    branches: [main]

jobs:
  deploy:
    name: Deploy to Vultr
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        env:
          GH_TOKEN: ${{ secrets.GH_DEPLOY_TOKEN }}
          SUDO_PASS: ${{ secrets.VULTR_SUDO_PASS }}
        with:
          host: ${{ secrets.VULTR_HOST }}
          username: ${{ secrets.VULTR_USER }}
          key: ${{ secrets.VULTR_KEY }}
          port: ${{ secrets.VULTR_PORT }}
          envs: GH_TOKEN,SUDO_PASS
          script: |
            export DEPLOY_PATH="${{ secrets.VULTR_DEPLOYMENT_PATH }}"

            # Trust repo ownership
            git config --global --add safe.directory "$DEPLOY_PATH"

            cd "$DEPLOY_PATH"

            # Pull as deploy user (secp has git credentials)
            git remote set-url origin https://x-access-token:${GH_TOKEN}@github.com/Freddo444/SECPMonitor.git
            git pull origin main
            git remote set-url origin https://github.com/Freddo444/SECPMonitor.git

            # Install JS dependencies and build assets (as secp — has npm access)
            npm ci --no-audit
            npm run build

            # Fix ownership back to www-data
            echo "$SUDO_PASS" | sudo -S chown -R www-data:www-data "$DEPLOY_PATH"
            echo "$SUDO_PASS" | sudo -S chmod -R 755 "$DEPLOY_PATH"
            echo "$SUDO_PASS" | sudo -S chmod -R 775 "$DEPLOY_PATH/storage" "$DEPLOY_PATH/bootstrap/cache"

            # Fix file permissions (644 for files, 755 for dirs) to keep git clean
            echo "$SUDO_PASS" | sudo -S find "$DEPLOY_PATH" -type f -not -path '*/.git/*' -not -path '*/node_modules/*' -exec chmod 644 {} +
            echo "$SUDO_PASS" | sudo -S find "$DEPLOY_PATH" -type d -not -path '*/.git/*' -not -path '*/node_modules/*' -exec chmod 755 {} +
            echo "$SUDO_PASS" | sudo -S chmod -R 775 "$DEPLOY_PATH/storage" "$DEPLOY_PATH/bootstrap/cache"
            echo "$SUDO_PASS" | sudo -S chmod 755 "$DEPLOY_PATH/artisan"

            # PHP tasks as www-data
            echo "$SUDO_PASS" | sudo -S -u www-data bash -c "
              cd '$DEPLOY_PATH'
              composer install --no-dev --no-interaction --prefer-dist --optimize-autoloader
              php artisan package:discover --ansi
              php artisan migrate --force
              php artisan config:cache
              php artisan route:cache
              php artisan view:cache
              php artisan event:cache
              php artisan queue:restart 2>/dev/null || true
            "

            # Restart supervisor worker
            echo "$SUDO_PASS" | sudo -S supervisorctl restart secp-worker:* 2>/dev/null || true

            echo 'Deployment complete.'
