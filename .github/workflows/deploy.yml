name: Production CI/CD

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: production-deploy
  cancel-in-progress: true

jobs:
  ci:
    name: CI Quality Gate
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup PHP
        uses: shivammathur/setup-php@8358ee0e2e8afe63c2fb8253d1d52085811ab1e5 # v2.37.1
        with:
          php-version: "8.3"
          tools: composer:v2
          coverage: none

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: "20"
          cache: npm

      - name: Install PHP dependencies (CI)
        run: composer install --no-interaction --prefer-dist

      - name: Validate Composer metadata
        run: composer validate --strict

      - name: Install JS dependencies (CI)
        run: npm ci --no-audit --fund=false

      - name: Build frontend assets (CI)
        run: npm run build

      - name: Lint Blade/PHP formatting
        run: ./vendor/bin/pint --test

  deploy:
    name: Deploy to Vultr (non-atomic)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: ci
    environment: production

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@0ff4204d59e8e51228ff73bce53f80d53301dee2 # v1.2.5
        env:
          GH_TOKEN: ${{ secrets.GH_DEPLOY_TOKEN }}
          SUDO_PASS: ${{ secrets.VULTR_SUDO_PASS }}
          DEPLOY_PATH: ${{ secrets.VULTR_DEPLOYMENT_PATH }}
        with:
          host: ${{ secrets.VULTR_HOST }}
          username: ${{ secrets.VULTR_USER }}
          key: ${{ secrets.VULTR_KEY }}
          port: ${{ secrets.VULTR_PORT }}
          envs: GH_TOKEN,SUDO_PASS,DEPLOY_PATH
          script: |
            set -Eeuo pipefail
            trap 'echo "Deployment failed at line $LINENO"' ERR

            sudo_exec() {
              echo "$SUDO_PASS" | sudo -S -p '' "$@"
            }

            if [ -z "${DEPLOY_PATH:-}" ]; then
              echo "DEPLOY_PATH secret is empty"
              exit 1
            fi

            cd "$DEPLOY_PATH"

            # Ensure repo is writable by deploy user and readable by web group
            sudo_exec chown -R radar:www-data "$DEPLOY_PATH"

            # Pull latest code cleanly from origin/main
            git remote set-url origin "https://x-access-token:${GH_TOKEN}@github.com/Freddo444/radardelicitaciones.git"
            git fetch --prune origin
            git reset --hard origin/main
            git remote set-url origin "https://github.com/Freddo444/radardelicitaciones.git"

            # Build app dependencies (production excludes dev packages; Sentry is in require)
            composer install --no-interaction --prefer-dist --optimize-autoloader --no-dev
            npm ci --no-audit --fund=false
            npm run build

            # Correct permissions for runtime write paths and executables
            sudo_exec find "$DEPLOY_PATH" -type f -not -path '*/.git/*' -not -path '*/node_modules/*' -exec chmod 644 {} +
            sudo_exec find "$DEPLOY_PATH" -type d -not -path '*/.git/*' -not -path '*/node_modules/*' -exec chmod 755 {} +
            sudo_exec chmod 755 "$DEPLOY_PATH/artisan"
            sudo_exec chmod -R 775 "$DEPLOY_PATH/storage" "$DEPLOY_PATH/bootstrap/cache"
            sudo_exec chown -R www-data:www-data "$DEPLOY_PATH/storage" "$DEPLOY_PATH/bootstrap/cache"

            # Framework optimization/migrations as web user (set SENTRY_LARAVEL_DSN in server .env for error reporting)
            sudo_exec -u www-data bash -lc "
              set -Eeuo pipefail
              cd '$DEPLOY_PATH'
              php artisan migrate --force
              php artisan config:cache
              php artisan route:cache
              php artisan event:cache
              php artisan view:cache
              php artisan queue:restart || true
            "

            # Restart workers managed by supervisor
            sudo_exec supervisorctl restart radar-worker:* || true

            # Optional health check (set APP_HEALTHCHECK_URL secret, e.g. https://radardelicitaciones.com/up)
            if [ -n "${{ secrets.APP_HEALTHCHECK_URL }}" ]; then
              curl --fail --silent --show-error "${{ secrets.APP_HEALTHCHECK_URL }}" >/dev/null
            fi

            echo "Deployment complete."
