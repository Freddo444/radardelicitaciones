name: Deploy to Production

on:
  push:
    branches: [main]

jobs:
  deploy:
    name: Deploy to Vultr
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        env:
          GH_TOKEN: ${{ secrets.GH_DEPLOY_TOKEN }}
        with:
          host: ${{ secrets.VULTR_HOST }}
          username: ${{ secrets.VULTR_USER }}
          key: ${{ secrets.VULTR_KEY }}
          port: ${{ secrets.VULTR_PORT }}
          envs: GH_TOKEN
          script: |
            export DEPLOY_PATH="${{ secrets.VULTR_DEPLOYMENT_PATH }}"

            # Trust repo ownership for the ssh user
            git config --global --add safe.directory "$DEPLOY_PATH"

            # Detect the owner of the deploy path and run everything as that user
            DEPLOY_USER=$(stat -c '%U' "$DEPLOY_PATH")

            sudo -u "$DEPLOY_USER" bash -c "
              cd '$DEPLOY_PATH'

              # Pull latest code
              git remote set-url origin https://x-access-token:${GH_TOKEN}@github.com/Freddo444/SECPMonitor.git
              git pull origin main
              git remote set-url origin https://github.com/Freddo444/SECPMonitor.git

              # Install/update PHP dependencies (no dev)
              composer install --no-dev --no-interaction --prefer-dist --optimize-autoloader
              php artisan package:discover --ansi

              # Install JS dependencies and build assets
              npm ci --no-audit
              npm run build

              # Run migrations
              php artisan migrate --force

              # Clear and rebuild caches
              php artisan config:cache
              php artisan route:cache
              php artisan view:cache
              php artisan event:cache

              # Restart queue worker if running
              php artisan queue:restart 2>/dev/null || true

              echo 'Deployment complete.'
            "
